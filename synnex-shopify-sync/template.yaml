AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sync data and inventory from TD Synnex to Shopify (Lambda)

Parameters:
  ShopifyStore:
    Type: String
    Description: Shopify store hostname (e.g. your-store from your-store.myshopify.com)
  ShopifyAccessToken:
    Type: String
    NoEcho: true
    Description: Shopify Admin API access token (write_products, write_inventory)
  ShopifyLocationId:
    Type: String
    Description: Shopify location GID (e.g. gid://shopify/Location/123456)
  SynnexApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: TD Synnex API key (optional when using Real-Time XML mode only)
  SynnexBaseUrl:
    Type: String
    Default: 'https://api.synnex.com'
    Description: TD Synnex API base URL (override for sandbox)
  SynnexXmlUrl:
    Type: String
    Default: ''
    Description: TD Synnex XML endpoint (e.g. https://ec.us.tdsynnex.com/SynnexXML/PriceAvailability)
  SynnexXmlCustomerNo:
    Type: String
    Default: ''
    Description: TD Synnex XML customer number
  SynnexXmlUsername:
    Type: String
    Default: ''
    Description: TD Synnex XML username
  SynnexXmlPassword:
    Type: String
    NoEcho: true
    Default: ''
    Description: TD Synnex XML password
  SynnexXmlRequestVersion:
    Type: String
    Default: ''
    Description: Optional XML request version (e.g. 2.8 for MSRP/weight)
  SynnexXmlSkuChunkSize:
    Type: String
    Default: '40'
    Description: SKUs per XML request chunk (default 40)
  SynnexXmlSyncPrices:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set false to sync inventory only (no Shopify price updates)
  SynnexXmlMsrpAsCompareAt:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Use XML MSRP as compare-at price when available

Globals:
  Function:
    Timeout: 300
    MemorySize: 256
    Runtime: nodejs20.x

Resources:
  SynnexShopifySyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/index.handler
      Description: Sync products and inventory from TD Synnex to Shopify
      Environment:
        Variables:
          SHOPIFY_STORE: !Ref ShopifyStore
          SHOPIFY_ACCESS_TOKEN: !Ref ShopifyAccessToken
          SHOPIFY_LOCATION_ID: !Ref ShopifyLocationId
          SYNNEX_API_KEY: !Ref SynnexApiKey
          SYNNEX_BASE_URL: !Ref SynnexBaseUrl
          SYNNEX_XML_URL: !Ref SynnexXmlUrl
          SYNNEX_XML_CUSTOMER_NO: !Ref SynnexXmlCustomerNo
          SYNNEX_XML_USERNAME: !Ref SynnexXmlUsername
          SYNNEX_XML_PASSWORD: !Ref SynnexXmlPassword
          SYNNEX_XML_REQUEST_VERSION: !Ref SynnexXmlRequestVersion
          SYNNEX_XML_SKU_CHUNK_SIZE: !Ref SynnexXmlSkuChunkSize
          SYNNEX_XML_SYNC_PRICES: !Ref SynnexXmlSyncPrices
          SYNNEX_XML_MSRP_AS_COMPARE_AT: !Ref SynnexXmlMsrpAsCompareAt
      Events:
        ScheduleSync:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Description: Run Synnex to Shopify sync every hour
            Enabled: true

Outputs:
  SynnexShopifySyncFunctionArn:
    Description: ARN of the sync Lambda
    Value: !GetAtt SynnexShopifySyncFunction.Arn
  SynnexShopifySyncFunctionName:
    Description: Name of the sync Lambda
    Value: !Ref SynnexShopifySyncFunction
