AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TD Synnex XML catalog and pricing → Shopify product sync (Lambda)

# ─── Parameters ───────────────────────────────────────────────────────────────

Parameters:

  # Shopify (required)
  ShopifyStore:
    Type: String
    Description: Store hostname — the part before .myshopify.com (e.g. my-store)
  ShopifyClientId:
    Type: String
    Description: Dev Dashboard app Client ID (Settings → Credentials)
  ShopifyClientSecret:
    Type: String
    NoEcho: true
    Description: Dev Dashboard app Client Secret
  ShopifyLocationId:
    Type: String
    Description: Inventory location GID — gid://shopify/Location/123456
  ShopifyAccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Permanent access token from one-time OAuth setup (takes priority over client_credentials)
  ShopifyApiVersion:
    Type: String
    Default: '2026-01'
    Description: Shopify Admin API version

  # TD Synnex SFTP (catalog-sync job)
  SynnexSftpHost:
    Type: String
    Default: 'sftp.us.tdsynnex.com'
    Description: TD Synnex SFTP hostname
  SynnexSftpPort:
    Type: String
    Default: '22'
    Description: SFTP port
  SynnexSftpUsername:
    Type: String
    Default: ''
    Description: SFTP username
  SynnexSftpRemotePath:
    Type: String
    Default: ''
    Description: Remote path to catalog XML or ZIP (e.g. /catalog.zip or /export.xml)
  SynnexSftpPassword:
    Type: String
    NoEcho: true
    Default: ''
    Description: SFTP password (prefer SynnexSftpSecretArn for production)
  SynnexSftpSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN containing {"password":"..."} — takes priority over SynnexSftpPassword
  SynnexSftpZipEntry:
    Type: String
    Default: ''
    Description: Exact file name inside the ZIP to extract (leave blank for auto-detect)

  # TD Synnex XML P&A (price-sync job)
  SynnexXmlUrl:
    Type: String
    Default: 'https://ec.us.tdsynnex.com/SynnexXML/PriceAvailability'
    Description: TD Synnex XML Price & Availability endpoint
  SynnexXmlCustomerNo:
    Type: String
    Default: ''
    Description: TD Synnex XML customer number
  SynnexXmlUsername:
    Type: String
    Default: ''
    Description: TD Synnex XML username
  SynnexXmlPassword:
    Type: String
    NoEcho: true
    Default: ''
    Description: TD Synnex XML password
  SynnexXmlRequestVersion:
    Type: String
    Default: '2.8'
    Description: XML request version (2.8 returns MSRP and weight fields)
  SynnexXmlSkuChunkSize:
    Type: String
    Default: '40'
    Description: SKUs per XML P&A request batch (max 200)
  SynnexXmlSyncPrices:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Push updated prices to Shopify during price-sync
  SynnexXmlMsrpAsCompareAt:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Show TD Synnex MSRP as the Shopify compare-at (crossed-out) price

  # Filtering & pricing
  SynnexSyncFilterBrands:
    Type: String
    Default: ''
    Description: Comma-separated manufacturer names to include (empty = all brands)
  SynnexSyncFilterCategories:
    Type: String
    Default: ''
    Description: Comma-separated category names to include (empty = all categories)
  SynnexSyncAllowlist:
    Type: String
    Default: ''
    Description: Comma-separated SKU allowlist (empty = allowlist not applied)
  SynnexSyncLimit:
    Type: String
    Default: ''
    Description: Max products to process per run — leave blank for all (set to 5 for testing)
  IcecatUsername:
    Type: String
    Default: ''
    Description: Icecat Open Catalog username for product descriptions and images
  IcecatAppKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: Icecat Full-tier app_key (blank = free Open Icecat). Unlocks gated brands/products.
  FedExClientId:
    Type: String
    Default: ''
    Description: FedEx API client ID (developer.fedex.com)
  FedExClientSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: FedEx API client secret
  FedExAccountNumber:
    Type: String
    Default: ''
    Description: FedEx account number for negotiated rates
  UpsClientId:
    Type: String
    Default: ''
    Description: UPS API client ID (developer.ups.com)
  UpsClientSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: UPS API client secret
  ShippingFreightBufferPct:
    Type: String
    Default: '12'
    Description: Percent buffer added to FedEx/UPS quotes to cover the TD Synnex freight gap
  ShippingHandlingFee:
    Type: String
    Default: '0'
    Description: Flat handling fee ($) added to each shipping rate

  # Order fulfillment
  SynnexOrderUrl:
    Type: String
    Default: 'https://ec.us.tdsynnex.com/SynnexXML/order'
    Description: TD Synnex XML order submission endpoint (confirm with your TD Synnex rep)
  SynnexOrderStatusUrl:
    Type: String
    Default: 'https://ec.us.tdsynnex.com/SynnexXML/orderstatus'
    Description: TD Synnex XML order status endpoint
  SynnexRmaUrl:
    Type: String
    Default: ''
    Description: TD Synnex XML RMA-creation endpoint (leave blank until the RMA spec is confirmed)
  SynnexRmaStatusUrl:
    Type: String
    Default: ''
    Description: TD Synnex XML RMA-status endpoint (leave blank until the RMA spec is confirmed)
  SynnexDefaultShipMethod:
    Type: String
    Default: 'FEDX_GRD'
    Description: Default ship method code for TD Synnex orders (FEDX_GRD, UPS_GRD, etc.)
  PriceMarkupPercent:
    Type: String
    Default: '15'
    Description: Markup % over TD Synnex cost price (e.g. 15 = customer pays cost × 1.15)
  PriceMinActive:
    Type: String
    Default: '1'
    Description: Price-sync drafts (hides) any product whose synced sell price is below this $ floor

  JunkMaxPrice:
    Type: String
    Default: '5'
    Description: Price-sync drafts cheap accessory/cable clutter below this $ floor that isn't real hardware (0 disables)

# ─── Conditions ───────────────────────────────────────────────────────────────

Conditions:
  HasSftpSecretArn: !Not [!Equals [!Ref SynnexSftpSecretArn, '']]

# ─── Globals ──────────────────────────────────────────────────────────────────

Globals:
  Function:
    Timeout: 600
    MemorySize: 3008
    Runtime: nodejs22.x
    Architectures: [arm64]

# ─── Resources ────────────────────────────────────────────────────────────────

Resources:

  # ── VPC + Static IP (NAT Gateway) ─────────────────────────────────────────
  # Gives the Lambda a fixed public IP so TD Synnex can whitelist it.

  SyncVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true

  # Public subnet — where the NAT Gateway lives
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SyncVpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  # Private subnet — where the Lambda runs (no direct internet exposure)
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SyncVpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SyncVpc
      InternetGatewayId: !Ref InternetGateway

  # Static public IP — this is the IP you give to TD Synnex to whitelist
  NatElasticIp:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc

  # NAT Gateway sits in the public subnet and routes Lambda traffic out
  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatElasticIp.AllocationId
      SubnetId: !Ref PublicSubnet

  # Public subnet routes → Internet Gateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SyncVpc

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Private subnet routes → NAT Gateway (outbound only, fixed IP)
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SyncVpc

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  # Security group: Lambda can initiate outbound connections, nothing can reach in
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Sync Lambda outbound only
      VpcId: !Ref SyncVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # DynamoDB Gateway endpoint — free, keeps DynamoDB traffic off the NAT Gateway
  DynamoDbEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref SyncVpc
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.dynamodb'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref SyncVpc
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  SyncApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Description: Manual triggers and health check for Synnex→Shopify sync

  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-sync'
      CodeUri: .
      Handler: src/handler.handler
      Description: TD Synnex XML catalog and pricing → Shopify sync
      Environment:
        Variables:
          # Shopify
          SHOPIFY_STORE: !Ref ShopifyStore
          SHOPIFY_CLIENT_ID: !Ref ShopifyClientId
          SHOPIFY_CLIENT_SECRET: !Ref ShopifyClientSecret
          SHOPIFY_ACCESS_TOKEN: !Ref ShopifyAccessToken
          SHOPIFY_LOCATION_ID: !Ref ShopifyLocationId
          SHOPIFY_API_VERSION: !Ref ShopifyApiVersion
          # SFTP
          SYNNEX_SFTP_HOST: !Ref SynnexSftpHost
          SYNNEX_SFTP_PORT: !Ref SynnexSftpPort
          SYNNEX_SFTP_USERNAME: !Ref SynnexSftpUsername
          SYNNEX_SFTP_REMOTE_PATH: !Ref SynnexSftpRemotePath
          SYNNEX_SFTP_PASSWORD: !Ref SynnexSftpPassword
          SYNNEX_SFTP_SECRET_ARN: !Ref SynnexSftpSecretArn
          SYNNEX_SFTP_ZIP_ENTRY: !Ref SynnexSftpZipEntry
          SYNNEX_SFTP_CACHE_BUCKET: !Ref CatalogCacheBucket
          # XML P&A
          SYNNEX_XML_URL: !Ref SynnexXmlUrl
          SYNNEX_XML_CUSTOMER_NO: !Ref SynnexXmlCustomerNo
          SYNNEX_XML_USERNAME: !Ref SynnexXmlUsername
          SYNNEX_XML_PASSWORD: !Ref SynnexXmlPassword
          SYNNEX_XML_REQUEST_VERSION: !Ref SynnexXmlRequestVersion
          SYNNEX_XML_SKU_CHUNK_SIZE: !Ref SynnexXmlSkuChunkSize
          SYNNEX_XML_SYNC_PRICES: !Ref SynnexXmlSyncPrices
          SYNNEX_XML_MSRP_AS_COMPARE_AT: !Ref SynnexXmlMsrpAsCompareAt
          # Filtering & pricing
          SYNNEX_SYNC_FILTER_BRANDS: !Ref SynnexSyncFilterBrands
          SYNNEX_SYNC_FILTER_CATEGORIES: !Ref SynnexSyncFilterCategories
          SYNNEX_SYNC_ALLOWLIST: !Ref SynnexSyncAllowlist
          SYNNEX_SYNC_LIMIT: !Ref SynnexSyncLimit
          ICECAT_USERNAME: !Ref IcecatUsername
          ICECAT_APP_KEY: !Ref IcecatAppKey
          FEDEX_CLIENT_ID: !Ref FedExClientId
          FEDEX_CLIENT_SECRET: !Ref FedExClientSecret
          FEDEX_ACCOUNT_NUMBER: !Ref FedExAccountNumber
          UPS_CLIENT_ID: !Ref UpsClientId
          UPS_CLIENT_SECRET: !Ref UpsClientSecret
          SHIPPING_FREIGHT_BUFFER_PCT: !Ref ShippingFreightBufferPct
          SHIPPING_HANDLING_FEE: !Ref ShippingHandlingFee
          SYNNEX_ORDER_URL: !Ref SynnexOrderUrl
          SYNNEX_ORDER_STATUS_URL: !Ref SynnexOrderStatusUrl
          SYNNEX_RMA_URL: !Ref SynnexRmaUrl
          SYNNEX_RMA_STATUS_URL: !Ref SynnexRmaStatusUrl
          SYNNEX_DEFAULT_SHIP_METHOD: !Ref SynnexDefaultShipMethod
          ORDERS_TABLE: !Ref OrdersTable
          RETURNS_TABLE: !Ref ReturnsTable
          PRODUCTS_TABLE: !Ref ProductsTable
          PRICE_MARKUP_PERCENT: !Ref PriceMarkupPercent
          PRICE_MIN_ACTIVE: !Ref PriceMinActive
          JUNK_MAX_PRICE: !Ref JunkMaxPrice
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
      Policies:
        # Allows Lambda to create network interfaces in the VPC (required for VPC mode)
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Sid: SecretsManagerRead
              Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !If
                - HasSftpSecretArn
                - !Ref SynnexSftpSecretArn
                - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*'
        - Statement:
            - Sid: S3CatalogCache
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:HeadObject
              Resource: !Sub 'arn:aws:s3:::${CatalogCacheBucket}/*'
      Events:
        # Continuous catalog discovery — 6 parallel partitions, each 2 minutes apart.
        # Each Lambda processes every 6th row of the .ap file (rowIndex % 6 === partition),
        # so all 6 run on completely disjoint sets of SKUs with zero overlap.
        # Together they provide ~6x throughput vs a single run.
        CatalogSync0:
          Type: Schedule
          Properties:
            Schedule: cron(0/12 * * * ? *)
            Input: '{"job":"catalog-sync","discover":true,"partition":0,"partitionCount":6}'
            Description: Catalog discovery partition 0/6
            Enabled: true
        CatalogSync1:
          Type: Schedule
          Properties:
            Schedule: cron(2/12 * * * ? *)
            Input: '{"job":"catalog-sync","discover":true,"partition":1,"partitionCount":6}'
            Description: Catalog discovery partition 1/6
            Enabled: true
        CatalogSync2:
          Type: Schedule
          Properties:
            Schedule: cron(4/12 * * * ? *)
            Input: '{"job":"catalog-sync","discover":true,"partition":2,"partitionCount":6}'
            Description: Catalog discovery partition 2/6
            Enabled: true
        CatalogSync3:
          Type: Schedule
          Properties:
            Schedule: cron(6/12 * * * ? *)
            Input: '{"job":"catalog-sync","discover":true,"partition":3,"partitionCount":6}'
            Description: Catalog discovery partition 3/6
            Enabled: true
        CatalogSync4:
          Type: Schedule
          Properties:
            Schedule: cron(8/12 * * * ? *)
            Input: '{"job":"catalog-sync","discover":true,"partition":4,"partitionCount":6}'
            Description: Catalog discovery partition 4/6
            Enabled: true
        CatalogSync5:
          Type: Schedule
          Properties:
            Schedule: cron(10/12 * * * ? *)
            Input: '{"job":"catalog-sync","discover":true,"partition":5,"partitionCount":6}'
            Description: Catalog discovery partition 5/6
            Enabled: true

        # Price & inventory update every 15 minutes
        PriceSync:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"job":"price-sync"}'
            Description: TD Synnex price and availability → Shopify update every 15 minutes
            Enabled: true

        # Nightly featured-products refresh — runs at 3 AM UTC (after catalog sync at 2 AM)
        # Rebuilds the "featured-products" collection with in-stock + image-having products only.
        RefreshFeatured:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 * * ? *)
            Input: '{"job":"refresh-featured"}'
            Description: Nightly rebuild of featured-products collection (in-stock + has image)
            Enabled: true

        # Resumable Icecat enrichment of marketable consumer-brand hardware.
        # Each run processes a chunk (resumes via a persisted scan cursor), fills in
        # titles/images/descriptions/specs, and tags completed items `featured`.
        # Enabled to self-drive to completion; disable once the run reports done:true.
        TargetedEnrich:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"job":"targeted-enrich"}'
            Description: Resumable Icecat enrichment + featured-tagging for consumer-brand hardware
            Enabled: false  # enrichment run completed 2026-06-24 (done:true, 13,542 enriched)

        # HTTP endpoints for manual triggering and monitoring
        HttpHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /health
            Method: GET
        HttpOauthCallback:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /oauth/callback
            Method: GET
        HttpB2bStandards:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /b2b/standards
            Method: GET
        HttpB2bStandardsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /b2b/standards
            Method: OPTIONS
        HttpCheckoutTerms:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /checkout/terms
            Method: GET
        HttpCheckoutTermsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /checkout/terms
            Method: OPTIONS
        HttpListZip:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /list-zip
            Method: GET
        HttpCleanCollections:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /clean-collections
            Method: POST
        HttpCatalogSync:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /catalog-sync
            Method: POST
        HttpPriceSync:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /price-sync
            Method: POST

        # Order fulfillment webhooks + manual triggers
        HttpOrderWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /webhook/orders
            Method: POST
        HttpOrderCancelledWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /webhook/orders-cancelled
            Method: POST
        HttpRefundsWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /webhook/refunds
            Method: POST
        HttpReturnsWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /webhook/returns
            Method: POST
        HttpSubmitOrders:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /submit-orders
            Method: POST
        HttpCheckTracking:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /check-tracking
            Method: POST
        HttpShippingRates:
          Type: HttpApi
          Properties:
            ApiId: !Ref SyncApi
            Path: /shipping-rates
            Method: POST

        # Submit pending orders to TD Synnex every 5 minutes
        SubmitOrders:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Input: '{"job":"submit-orders"}'
            Description: Submit pending Shopify orders to TD Synnex for dropship fulfillment
            Enabled: true

        # Check TD Synnex for tracking numbers every 15 minutes
        CheckTracking:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"job":"check-tracking"}'
            Description: Check TD Synnex order status and update Shopify fulfillments
            Enabled: true

        # Returns / RMA — DISABLED until the TD SYNNEX RMA spec is confirmed and
        # SYNNEX_RMA_URL is set. The jobs no-op while unconfigured; enable then.
        SubmitRmas:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Input: '{"job":"submit-rmas"}'
            Description: Open TD Synnex RMAs for requested Shopify returns
            Enabled: false
        CheckRma:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"job":"check-rma"}'
            Description: Poll TD Synnex RMA status and close out received returns
            Enabled: false

        # Backfill Icecat images for products missing images — runs every 15 minutes
        ImageBackfill:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Input: '{"job":"image-backfill","limit":2000}'
            Description: Fetch and attach Icecat images for Shopify products with no images
            Enabled: true

        # One-off backfill: list current B2B hardware SKUs not yet in Shopify (auto-categorized
        # + Icecat-enriched). Runs unattended in AWS every 6 min. DISABLE once the ~24K are listed.
        # Backfill complete 2026-06-16 (~26,385 B2B SKUs listed, converged). Disabled.
        B2bListing:
          Type: Schedule
          Properties:
            Schedule: rate(6 minutes)
            Input: '{"job":"targeted-discover","b2bOnly":true}'
            Description: Backfill B2B hardware listings (complete — disabled)
            Enabled: false

        # Nightly reconciliation — draft any active listing whose SKU is no longer in the
        # live TD Synnex catalog (orphaned/discontinued), so the storefront only shows
        # products we can actually fulfill. Runs at 4 AM UTC (after catalog discovery).
        # Disabled until a reviewed dry-run + first manual apply confirm the scope is safe.
        # Enable only after validation so we don't auto-draft listings unattended.
        ReconcileListings:
          Type: Schedule
          Properties:
            Schedule: cron(0 4 * * ? *)
            Input: '{"job":"reconcile-listings","apply":true}'
            Description: Draft storefront listings no longer backed by the live catalog
            Enabled: false

  CatalogCacheBucket:
    Type: AWS::S3::Bucket
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldCatalogs
            Status: Enabled
            ExpirationInDays: 3

  # DynamoDB table for tracking Shopify → TD Synnex order state
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-orders'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: shopifyOrderId
          AttributeType: S
      KeySchema:
        - AttributeName: shopifyOrderId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # DynamoDB table tracking Shopify returns through the RMA lifecycle
  ReturnsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-returns'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: shopifyReturnId
          AttributeType: S
      KeySchema:
        - AttributeName: shopifyReturnId
          KeyType: HASH

  # DynamoDB table — approved product catalog (every SKU we've chosen to sell)
  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-products'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: synnexSku
          AttributeType: S
        - AttributeName: mfrPartNumber
          AttributeType: S
      KeySchema:
        - AttributeName: synnexSku
          KeyType: HASH
      # Reverse lookup: manufacturer part number (the Shopify variant SKU) → numeric
      # synnexSku, used at order time so orders submit a valid TD Synnex catalog ID.
      GlobalSecondaryIndexes:
        - IndexName: mfrPartNumber-index
          KeySchema:
            - AttributeName: mfrPartNumber
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Grant Lambda read/write access to the products table
  ProductsTablePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-products-dynamodb'
      Roles:
        - !Ref SyncFunctionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:Scan
              - dynamodb:Query
            Resource:
              - !GetAtt ProductsTable.Arn
              - !Sub '${ProductsTable.Arn}/index/*'

  # Grant Lambda read/write access to the orders table
  OrdersTablePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-orders-dynamodb'
      Roles:
        - !Ref SyncFunctionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:Scan
              - dynamodb:Query
            Resource: !GetAtt OrdersTable.Arn

  # Grant Lambda read/write access to the returns table
  ReturnsTablePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-returns-dynamodb'
      Roles:
        - !Ref SyncFunctionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:Scan
              - dynamodb:Query
            Resource: !GetAtt ReturnsTable.Arn

# ─── Outputs ──────────────────────────────────────────────────────────────────

Outputs:
  LambdaStaticIp:
    Description: Static public IP — give this to TD Synnex to whitelist for XML P&A API access
    Value: !Ref NatElasticIp

  SyncFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SyncFunction.Arn
  ApiBaseUrl:
    Description: HTTP API base URL
    Value: !Sub 'https://${SyncApi}.execute-api.${AWS::Region}.amazonaws.com'
  HealthUrl:
    Description: Health check endpoint
    Value: !Sub 'https://${SyncApi}.execute-api.${AWS::Region}.amazonaws.com/health'
  CatalogSyncUrl:
    Description: Manual catalog sync trigger (POST)
    Value: !Sub 'https://${SyncApi}.execute-api.${AWS::Region}.amazonaws.com/catalog-sync'
  PriceSyncUrl:
    Description: Manual price/inventory sync trigger (POST)
    Value: !Sub 'https://${SyncApi}.execute-api.${AWS::Region}.amazonaws.com/price-sync'
  ListZipUrl:
    Description: List ZIP entries for SFTP debug (GET)
    Value: !Sub 'https://${SyncApi}.execute-api.${AWS::Region}.amazonaws.com/list-zip'
  OrderWebhookUrl:
    Description: Register this URL in Shopify as the orders/paid webhook
    Value: !Sub 'https://${SyncApi}.execute-api.${AWS::Region}.amazonaws.com/webhook/orders'
  ReturnsWebhookUrl:
    Description: Register this URL in Shopify for returns/request + returns/approve webhooks
    Value: !Sub 'https://${SyncApi}.execute-api.${AWS::Region}.amazonaws.com/webhook/returns'
  ShippingRatesUrl:
    Description: Register this URL in Shopify as a carrier service (Settings → Shipping → Manage rates)
    Value: !Sub 'https://${SyncApi}.execute-api.${AWS::Region}.amazonaws.com/shipping-rates'
  OrdersTableName:
    Description: DynamoDB table tracking order fulfillment state
    Value: !Ref OrdersTable
  ProductsTableName:
    Description: DynamoDB table of approved products to sell (SKUs discovered from catalog)
    Value: !Ref ProductsTable
  CatalogCacheBucketName:
    Description: S3 bucket caching daily TD Synnex catalog (.ap file)
    Value: !Ref CatalogCacheBucket
